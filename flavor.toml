  title    = {}
  value    = {}

[tamts]
  border  = { fg = "#c0c0f0" }
  hovered = { fg = "#f0c0f0", underline = true }
  title   = {}

[which]
  cols            = 2
  mamt            = { bg = "#101010" }
  rest            = { fg = "#d0d0d0" }
  cand            = { fg = "#80a050" }
  desc            = { fg = "#5080a0" }
