[flavor]
  use = ""

[mgr]
  cwd = { fg = "#a0a050", bold = true }

  # Hovered
  preview_hovered = { bg = "#202020" }
  hovered         = { reversed = true, bold = true }

  # Marker
  marker_marked   = { fg = "#f0e0c0", bg = "#f0e0c0" }
  marker_selected = { fg = "#f0f0c0", bg = "#f0f0c0" }
  marker_copied   = { fg = "#e0c0f0", bg = "#e0c0f0" }
  marker_cut      = { fg = "#f0c0e0", bg = "#f0c0e0" }

  # Count
  count_marked    = { fg = "#f0e0c0", reversed = true, bold = true }
  count_selected  = { fg = "#f0f0c0", reversed = true, bold = true }
  count_copied    = { fg = "#e0c0f0", reversed = true, bold = true }
  count_cut       = { fg = "#f0c0e0", reversed = true, bold = true }

  # Tab
  tab_active      = { fg = "#c0e0f0", reversed = true, bold = true }
  tab_inactive    = {}
  tab_width       = 1

  # Find
  find_keyword    = { fg = "#f0f0c0",               bold = true, italic = true, underline = true }
  find_position   = { fg = "#f0c0f0", bg = "reset", bold = true, italic = true }

  # Border
  border_style    = { fg = "#5080a0" }
  border_symbol   = "|"

  # Highlighting
  syntect_theme   = ""

[mode]
  # mode_normal     = { fg = "#202020", bg = "#c0e0f0", bold = true }
  # mode_select     = { fg = "#101010", bg = "#f0e0c0", bold = true }
  # mode_unset      = { fg = "#101010", bg = "#c0f0f0", bold = true }
  normal_main     = { fg = "#202020", bg = "#c0e0f0", bold = true }
  normal_alt      = { fg = "#c0e0f0", bg = "#202020", bold = true }
  select_main     = { fg = "#101010", bg = "#f0e0c0", bold = true }
  select_alt      = { fg = "#f0e0c0", bg = "#202020", bold = true }
  unset_main      = { fg = "#101010", bg = "#c0f0f0", bold = true }
  unset_alt       = { fg = "#c0f0f0", bg = "#101010", bold = true }

[status]
  # sep_left  = { open = "ىé╢", close = "ىé┤" }
  # sep_right = { open = "ىé╢", close = "ىé┤" }
  overall   = {}
  sep_left  = { open = "", close = "" }
  sep_right = { open = "ىé║", close = "" }

  # Permissions
  perm_sep        = { fg = "#d0d0d0" }
  perm_type       = { fg = "#c0e0f0" }
  perm_read       = { fg = "#5080a0" }
  perm_write      = { fg = "#5080a0" }
  perm_exec       = { fg = "#5080a0" }

  # Progress
  progress_label  = { bold = true }
  progress_normal = { fg = "#c0f0c0", bg = "#001010" }
  progress_error  = { fg = "#f0c0c0", bg = "#001010" }

[select]
  border   = { fg = "#e0f0f0" }
  active   = { fg = "#f0e0f0", bold = true }
  inactive = {}

[input]
  border   = { fg = "#c0e0f0" }
